# 
# Survey stragegy is defined by this SIMLIB/Cadence file:
#    $SNANA_ROMAN_USERS/rkessler/makeSimlib/set06_ccs-recommendation/output_CCSREC_V1/ROMAN-a00-t00-z00_x00.SIMLIB
# 
# Train+Fit_LR_Random_5 task summary: 
#	 Train+Fit_LR_Random_5: Applied random calib shifts. Gaussian STD -> 5mmag for ZP and 5A for lamda. Has 30 model realizations
# True w0 wa = -1.0  0.0
# FAST option is False
# 
# % include: $SNANA_ROMAN_USERS/pippin_ka_analysis/inp_base_include.yml %

ALIAS:

  SIMLIB_FILE_ROMAN:  &simlib_file_roman
    SIMLIB_FILE:  $SNANA_ROMAN_USERS/rkessler/makeSimlib/set06_ccs-recommendation/output_CCSREC_V1/ROMAN-a00-t00-z00_x00.SIMLIB

  SIM_SAME_SAMPLE:  &sim_same_sample
    FORMAT_MASK:     48
    RANSEED_CHANGE:   9  61709   #  FAST:  4
    RANSEED:          98241    # same seed among all samples
    SIMLIB_IDSTART:       2    # same LIBIDs among all samples
    CIDOFF:               0    # same CIDOFF (and randoms) among all samples


  COSPAR_SIM: &cospar_sim
    w0_LAMBDA:     -1.0
    wa_LAMBDA:     0.0

  COSPAR_BBC: &cospar_bbc
      p11:  -1.0 
      p12:  0.0

  COV_OPTS_ANALYSIS0: &cov_opts_analysis0
    COVOPTS:   #    +FITIOPT, +MUOPT
      - "[NOSYS]           [=DEFAULT,=DEFAULT]"
      - "[ZSHIFT]          [+zshift,=DEFAULT]" 
      - "[ZERRSCALE]       [+ZERRSCALE,=DEFAULT]" 
      - "[Photo_shift]     [+Photo_shift,=DEFAULT]" 
      - "[MWEBV]           [=MWEBV,=DEFAULT]" 
      - "[Cal_ALL]             [+Cal,=DEFAULT]" 
      - "[Cal_SALT3]           [+Cal_SALT3,=DEFAULT]" 
      - "[Cal_mag_per_A]       [+Cal_mag_per_A,=DEFAULT]"
      - "[Cal_ROMAN_nonlin]    [+Cal_ROMAN_nonlin,=DEFAULT]"
      - "[Cal_SALT3_LSST_ZP]         [+Cal_SALT3_LSST_ZP,=DEFAULT]" 
      - "[Cal_SALT3_LSST_wave]       [+Cal_SALT3_LSST_wave,=DEFAULT]"
      - "[Cal_SALT3_ROMAN_ZP]        [+Cal_SALT3_ROMAN_ZP,=DEFAULT]"
      - "[Cal_SALT3_ROMAN_wave]      [+Cal_SALT3_ROMAN_wave,=DEFAULT]"
      - "[Cal_SALT3_LSST_ZP_u]       [+Cal_SALT3_LSST_ZP_u,=DEFAULT]"  
      - "[Cal_SALT3_LSST_ZP_g]       [+Cal_SALT3_LSST_ZP_g,=DEFAULT]" 
      - "[Cal_SALT3_LSST_ZP_r]       [+Cal_SALT3_LSST_ZP_r,=DEFAULT]"
      - "[Cal_SALT3_LSST_ZP_i]       [+Cal_SALT3_LSST_ZP_i,=DEFAULT]"
      - "[Cal_SALT3_LSST_ZP_z]       [+Cal_SALT3_LSST_ZP_z,=DEFAULT]"
      - "[Cal_SALT3_LSST_ZP_Y]       [+Cal_SALT3_LSST_ZP_Y,=DEFAULT]"
      - "[Cal_SALT3_LSST_wave_u]     [+Cal_SALT3_LSST_wave_u,=DEFAULT]"
      - "[Cal_SALT3_LSST_wave_g]     [+Cal_SALT3_LSST_wave_g,=DEFAULT]"
      - "[Cal_SALT3_LSST_wave_r]     [+Cal_SALT3_LSST_wave_r,=DEFAULT]"
      - "[Cal_SALT3_LSST_wave_i]     [+Cal_SALT3_LSST_wave_i,=DEFAULT]"
      - "[Cal_SALT3_LSST_wave_z]     [+Cal_SALT3_LSST_wave_z,=DEFAULT]"
      - "[Cal_SALT3_LSST_wave_Y]     [+Cal_SALT3_LSST_wave_Y,=DEFAULT]"   
      - "[Cal_SALT3_ROMAN_ZP_R]      [+Cal_SALT3_ROMAN_ZP_R,=DEFAULT]" 
      - "[Cal_SALT3_ROMAN_ZP_Z]      [+Cal_SALT3_ROMAN_ZP_Z,=DEFAULT]"
      - "[Cal_SALT3_ROMAN_ZP_Y]      [+Cal_SALT3_ROMAN_ZP_Y,=DEFAULT]"
      - "[Cal_SALT3_ROMAN_ZP_J]      [+Cal_SALT3_ROMAN_ZP_J,=DEFAULT]"
      - "[Cal_SALT3_ROMAN_ZP_H]      [+Cal_SALT3_ROMAN_ZP_H,=DEFAULT]"
      - "[Cal_SALT3_ROMAN_ZP_F]      [+Cal_SALT3_ROMAN_ZP_F,=DEFAULT]"
      - "[Cal_SALT3_ROMAN_wave_R]    [+Cal_SALT3_ROMAN_wave_R,=DEFAULT]"
      - "[Cal_SALT3_ROMAN_wave_Z]    [+Cal_SALT3_ROMAN_wave_Z,=DEFAULT]"
      - "[Cal_SALT3_ROMAN_wave_Y]    [+Cal_SALT3_ROMAN_wave_Y,=DEFAULT]"
      - "[Cal_SALT3_ROMAN_wave_J]    [+Cal_SALT3_ROMAN_wave_J,=DEFAULT]"
      - "[Cal_SALT3_ROMAN_wave_H]    [+Cal_SALT3_ROMAN_wave_H,=DEFAULT]"
      - "[Cal_SALT3_ROMAN_wave_F]    [+Cal_SALT3_ROMAN_wave_F,=DEFAULT]"


  COV_OPTS_ANALYSIS1: &cov_opts_analysis1
    COVOPTS:   #    +FITIOPT, +MUOPT
      - "[NOSYS]           [=DEFAULT,=DEFAULT]"
      - "[ZSHIFT]          [+zshift,=DEFAULT]" 
      - "[ZERRSCALE]       [+ZERRSCALE,=DEFAULT]" 
      - "[Photo_shift]     [+Photo_shift,=DEFAULT]" 
      - "[MWEBV]           [=MWEBV,=DEFAULT]" 
      - "[Cal_ALL]             [+Cal,=DEFAULT]"  
      - "[Cal_mag_per_A]       [+Cal_mag_per_A,=DEFAULT]"
      - "[Cal_ROMAN_nonlin]    [+Cal_ROMAN_nonlin,=DEFAULT]"
      - "[Cal_SALT3]           [+Cal_SALT3,=DEFAULT]"
      - "[Cal_SALT3_SUBSET1]           [+Cal_SALT3_SUBSET1,=DEFAULT,1.7321]"
      - "[Cal_SALT3_SUBSET2]           [+Cal_SALT3_SUBSET2,=DEFAULT,1,7321]"
      - "[Cal_SALT3_SUBSET3]           [+Cal_SALT3_SUBSET3,=DEFAULT,1.7321]"      
 

  COV_OPTS_BASELINE: &cov_opts_baseline
    COVOPTS:   # +FITIOPT, +MUOPT
      - "[NOSYS]            [=DEFAULT,=DEFAULT]"

  COV_OPTS_UNBIN_BASELINE: &cov_opts_unbin_baseline
    COVOPTS:   # +FITIOPT, +MUOPT
      - "[NOSYS]            [=DEFAULT,=DEFAULT]"


#  COV_OPTS_UNBIN_ANALYSIS0: &cov_opts_unbin_analysis0
#    COVOPTS:   #    +FITIOPT, +MUOPT
#      - "[NOSYS]           [=DEFAULT,=DEFAULT]"

#  COV_OPTS_UNBIN_ANALYSIS1: &cov_opts_unbin_analysis1
#    COVOPTS:   #    +FITIOPT, +MUOPT
#      - "[NOSYS]           [=DEFAULT,=DEFAULT]"

# - - -     
  w_OPTS: &w_opts
    WFITOPTS:
    - /CMB_PRI/ -cmb_sim -w0_sim -1.0 -wa_sim 0.0   -sigma_Rcmb 0.0044  -wsteps 201 -omsteps 61 -ommin .15 -ommax .45 -outfile_chi2grid dummy.out -outfile_resid resid.out

  w0wa_OPTS: &w0wa_opts
    WFITOPTS:
    - /CMB_PRI/ -cmb_sim -w0_sim -1.0 -wa_sim 0.0 -sigma_Rcmb 0.0044 -wa -wamin -0.80 -wamax 0.80 -wasteps 91 -omsteps 61 -ommin .15 -ommax .45 -w0steps 101 -w0min -1.50 -w0max -0.50 -outfile_chi2grid dummy.out -outfile_resid resid.out

  w0wa_OPTS_UNBIN: &w0wa_opts_unbin
    WFITOPTS:
    - /CMB_PRI/ -cmb_sim -w0_sim -1.0 -wa_sim 0.0 -sigma_Rcmb 0.0044 -wa -wamin -0.60 -wamax 0.60 -wasteps 81 -omsteps 37 -ommin .21 -ommax .39 -w0steps 81 -w0min -1.40 -w0max -0.60 -outfile_chi2grid dummy.out -outfile_resid resid.out


