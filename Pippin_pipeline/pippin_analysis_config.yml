      OPTS:
        BATCH_INFO: sbatch $SBATCH_TEMPLATES/SBATCH_Midway2b.TEMPLATE 72
        <<: *w0wa_opts
        WFITAVG:
        - REBIN_BBC_ALL
        - REBIN_BBC_noDDF
        - REBIN_BBC_noWIDE
        - REBIN_BBC_noDEEP

