SIM:
  ROMAN_BCOR_CC:
    EXTERNAL: $PIPPIN_OUTPUT/ROMAN02_KA_LCDM_BCOR/1_SIM/ROMAN_BCOR_CC
  ROMAN_BCOR_Ia:
    EXTERNAL: $PIPPIN_OUTPUT/ROMAN02_KA_LCDM_BCOR/1_SIM/ROMAN_BCOR_Ia
  LOWZ_BCOR:
    EXTERNAL: $PIPPIN_OUTPUT/ROMAN02_KA_LCDM_BCOR/1_SIM/LOWZ_BCOR
  DDF_BCOR:
    EXTERNAL: $PIPPIN_OUTPUT/ROMAN02_KA_LCDM_BCOR/1_SIM/DDF_BCOR


  ROMAN_DATA:
    IA:
      BASE: $SNANA_ROMAN_ROOT/starterKits/sample_input_files/SIMGEN_TRANSIENT_SNIa-normal.INPUT
      <<: *roman_base_ia
      <<: *hostlib_file_roman
      <<: *simlib_file_roman
      <<: *sniamodel_dust      
    
    PECIAX:
      <<: *roman_base_peciax
      <<: *hostlib_file_roman
      <<: *simlib_file_roman

    PECIA91BG:
      <<: *roman_base_pec91bg
      <<: *hostlib_file_roman
      <<: *simlib_file_roman

    IIP_TEMPLATES:
      <<: *roman_base_iip
      <<: *hostlib_file_roman
      <<: *simlib_file_roman

    IIL_TEMPLATES:
      <<: *roman_base_iil
      <<: *hostlib_file_roman
      <<: *simlib_file_roman

    Ib_TEMPLATES:
      <<: *roman_base_ib
      <<: *hostlib_file_roman
      <<: *simlib_file_roman

    Ic_TEMPLATES:
      <<: *roman_base_ic
      <<: *hostlib_file_roman
      <<: *simlib_file_roman
  
    
    GLOBAL:
      NGEN_UNIT:      1.0   #  FAST: 0.2
      FORMAT_MASK:    48
      RANSEED_CHANGE:  9  121549  # FAST: 4
      <<: *batch_info_simgen_roman
      <<: *cospar_sim

# - - - - - -
  LOWZ_DATA:
    IA:
      <<: *lowz_base
      <<: *sniamodel_dust    
      NGENTOT_LC:        5200    # ADJUST to get get 800 at output of BBC stage
    GLOBAL:
      FORMAT_MASK:    48
      RANSEED_CHANGE:  9  893321  # FAST: 4
# xxx      <<: *sim_same_sample
      <<: *batch_info_simgen_lowz
      <<: *cospar_sim

  DDF_DATA:
    IA:
      <<: *ddf_base
      <<: *ddf_redshift_data 
      <<: *sniamodel_dust    
      NGENTOT_LC:   8800       #  ADJUST to get 3500 at output of BBC stage FAST: 2000 
    GLOBAL:
      FORMAT_MASK:    48
      RANSEED_CHANGE:  9  655487    # FAST: 4
# xxx mark      <<: *sim_same_sample
      <<: *batch_info_simgen_ddf
      <<: *cospar_sim

