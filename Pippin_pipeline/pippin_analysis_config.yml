LCFIT:
  FIT_ROMAN_DATA:
    BASE: $SNANA_ROMAN_ROOT/starterKits/sample_input_files/SIMFIT_ROMAN_TEMPLATE.nml
    MASK: ROMAN_DATA
    FITOPTS:  $directory_path/FITOPT_SYST+SALT3TRAIN.yml
    OPTS:
      <<: *batch_info_lcfit_roman_data
    SNLCINP:
      <<: *roman_snlcinp_cuts
    FITINP:
      FITMODEL_NAME:  $model_dir_path/SALT3.MODEL000
      <<: *roman_fitinp_cuts

# fit again for biascor; leave out FITOPTs
  FIT_ROMAN_BCOR:
    BASE: $SNANA_ROMAN_ROOT/starterKits/sample_input_files/SIMFIT_ROMAN_TEMPLATE.nml
    MASK: ROMAN_BCOR
    EXTERNAL_DIRS:
      - $PIPPIN_OUTPUT/ROMAN02_KA_LCDM_BCOR/2_LCFIT/ROMAN_ROMAN_BCOR_Ia
      - $PIPPIN_OUTPUT/ROMAN02_KA_LCDM_BCOR/2_LCFIT/ROMAN_ROMAN_BCOR_CC
    EXTERNAL_MAP:
      FIT_ROMAN_BCOR_ROMAN_BCOR_Ia: ROMAN_ROMAN_BCOR_Ia
      FIT_ROMAN_BCOR_ROMAN_BCOR_CC: ROMAN_ROMAN_BCOR_CC
      
# - - - - - - -

  FIT_LOWZ_DATA:
    BASE:  $directory_path/LCFIT_LSST.NML
    MASK:  LOWZ_DATA
    FITOPTS:  $directory_path/FITOPT_SYST+SALT3TRAIN.yml
    OPTS:
      <<: *batch_info_lcfit_lowz
    FITINP:
      FITMODEL_NAME:  $model_dir_path/SALT3.MODEL000
 
# fit again for biascor; leave out FITOPTs
  FIT_LOWZ_BCOR:
    BASE: $directory_path/LCFIT_LSST.NML
    MASK: LOWZ_BCOR
#    OPTS:
#      <<: *batch_info_lcfit

# xxxxxxx
#    EXTERNAL_DIRS:
#      - $PIPPIN_OUTPUT/ROMAN01_BCOR+TRAIN/2_LCFIT/LOWZ_LOWZ_BCOR
# xxxxxxx

    EXTERNAL_DIRS:
      - $PIPPIN_OUTPUT/ROMAN02_KA_LCDM_BCOR/2_LCFIT/LOWZ_LOWZ_BCOR
    EXTERNAL_MAP:
      FIT_LOWZ_BCOR_LOWZ_BCOR:  LOWZ_LOWZ_BCOR

# - - - -
  FIT_DDF_DATA:
    BASE:  $directory_path/LCFIT_LSST.NML
    MASK:  DDF_DATA
    FITOPTS:  $directory_path/FITOPT_SYST+SALT3TRAIN.yml
    OPTS:
      <<: *batch_info_lcfit_ddf
    FITINP:
      FITMODEL_NAME:  $model_dir_path/SALT3.MODEL000

# fit again for biascor; leave out FITOPTs
  FIT_DDF_BCOR:
    BASE: $directory_path/LCFIT_LSST.NML
    MASK: DDF_BCOR
#    OPTS:
#      <<: *batch_info_lcfit

# xxxxxxxxxxx
#    EXTERNAL_DIRS:
#      - $PIPPIN_OUTPUT/ROMAN01_BCOR+TRAIN/2_LCFIT/DDF_DDF_BCOR
# xxxxxxxxxxxx

    EXTERNAL_DIRS:
      - $PIPPIN_OUTPUT/ROMAN02_KA_LCDM_BCOR/2_LCFIT/DDF_DDF_BCOR
    EXTERNAL_MAP:
      FIT_DDF_BCOR_DDF_BCOR:  DDF_DDF_BCOR

# - - - - - - 

CLASSIFICATION:
  SCONE_PREDICT:
    CLASSIFIER: SconeClassifier
    BASE:  $directory_path/SCONE.INPUT
    MODE:  predict
    MASK:  ROMAN_DATA
    OPTS:
      OPTIONAL_MASK_FIT:  ROMAN_DATA
      NUM_EPOCHS: 200
      GPU: False
      TRAINED_MODEL: $PIPPIN_OUTPUT/ROMAN02_KA_LCDM_BCOR/3_CLAS/SCONE_TRAIN_ROMAN_BCOR_CC_ROMAN_BCOR_Ia/trained_model

#      BATCH_REPLACE:
#      #        REPLACE_MEM: 16GB


# - - - - - - 
AGGREGATION:
  AGG:



MERGE:
  MERGE:
    OPTS:
      BATCH_REPLACE:
        REPLACE_MEM: 30GB
        REPLACE_WALLTIME: "05:00:00"


BIASCOR:     # BBC stage
  BBC_ALL:
    BASE: $directory_path/SALT2mu_BBC.INPUT
    DATA: [ FIT_ROMAN_DATA_ROMAN_DATA, FIT_LOWZ_DATA_LOWZ_DATA, FIT_DDF_DATA_DDF_DATA ]
    CLASSIFIER:  SCONE_PREDICT
    SIMFILE_BIASCOR: [ FIT_ROMAN_BCOR_ROMAN_BCOR_Ia, FIT_LOWZ_BCOR_LOWZ_BCOR, FIT_DDF_BCOR_DDF_BCOR ]
    SIMFILE_CCPRIOR:   FIT_ROMAN_BCOR_ROMAN_BCOR_CC
    OPTS:
      BATCH_INFO: sbatch $SBATCH_TEMPLATES/SBATCH_Midway2b.TEMPLATE 40
      <<: *cospar_bbc

  BBC_noDDF:
    BASE: $directory_path/SALT2mu_BBC.INPUT
    DATA: [ FIT_ROMAN_DATA_ROMAN_DATA, FIT_LOWZ_DATA_LOWZ_DATA ]
    CLASSIFIER:  SCONE_PREDICT
    SIMFILE_BIASCOR: [ FIT_ROMAN_BCOR_ROMAN_BCOR_Ia, FIT_LOWZ_BCOR_LOWZ_BCOR ]
    SIMFILE_CCPRIOR:   FIT_ROMAN_BCOR_ROMAN_BCOR_CC
    OPTS:
      BATCH_INFO: sbatch $SBATCH_TEMPLATES/SBATCH_Midway2b.TEMPLATE 30
      <<: *cospar_bbc

  BBC_noWIDE:
    BASE: $directory_path/SALT2mu_BBC.INPUT
    DATA: [ FIT_ROMAN_DATA_ROMAN_DATA, FIT_LOWZ_DATA_LOWZ_DATA, FIT_DDF_DATA_DDF_DATA ]
    CLASSIFIER:  SCONE_PREDICT
    SIMFILE_BIASCOR: [ FIT_ROMAN_BCOR_ROMAN_BCOR_Ia, FIT_LOWZ_BCOR_LOWZ_BCOR, FIT_DDF_BCOR_DDF_BCOR ]
    SIMFILE_CCPRIOR:   FIT_ROMAN_BCOR_ROMAN_BCOR_CC
    OPTS:
      fieldlist:           WFD,DDF,DEEP
      fieldgroup_biascor:  WFD(zbin=.02),DDF(zbin=.04),DEEP(zbin=0.08)
      BATCH_INFO: sbatch $SBATCH_TEMPLATES/SBATCH_Midway2b.TEMPLATE 30
      <<:  *cospar_bbc

  BBC_noDEEP:
    BASE: $directory_path/SALT2mu_BBC.INPUT
    DATA: [ FIT_ROMAN_DATA_ROMAN_DATA, FIT_LOWZ_DATA_LOWZ_DATA, FIT_DDF_DATA_DDF_DATA ]
    CLASSIFIER:  SCONE_PREDICT#
    SIMFILE_BIASCOR: [ FIT_ROMAN_BCOR_ROMAN_BCOR_Ia, FIT_LOWZ_BCOR_LOWZ_BCOR, FIT_DDF_BCOR_DDF_BCOR ]
    SIMFILE_CCPRIOR:   FIT_ROMAN_BCOR_ROMAN_BCOR_CC
    OPTS:
      fieldlist:           WFD,DDF,WIDE
      fieldgroup_biascor:  WFD(zbin=.02),DDF(zbin=.04),WIDE(zbin=0.05)
      BATCH_INFO: sbatch $SBATCH_TEMPLATES/SBATCH_Midway2b.TEMPLATE 30
      <<: *cospar_bbc

# =========================

CREATE_COV:
  BINNED:
    MASK: BBC
    OPTS:
      BINNED: True
      BATCH_INFO: sbatch $SBATCH_TEMPLATES/SBATCH_Midway2b.TEMPLATE 9
      <<: *cov_opts_analysis1

  REBIN:
    MASK: BBC
    OPTS:
      BINNED:      False
      REBINNED_X1: 4 # Rebin x1 into 4 bins
      REBINNED_C:  8 # Rebin c into 8 bins
      BATCH_INFO: sbatch $SBATCH_TEMPLATES/SBATCH_Midway2b.TEMPLATE 9
      <<: *cov_opts_analysis1

  # note that extra cores and memory are allocated for unbinned,
  # and only BBC_ALL is processed (noDDF, noWIDE, noDEEP are skipped)
